<!-- templates/registro.html -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro - DatosConsultora</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<style>
body {
    background: linear-gradient(135deg, #004d5c 0%, #006d82 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
}
.login-card {
    background: white;
    border-radius: 15px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}
.btn-primary {
    background-color: #004d5c;
    border-color: #004d5c;
}
.btn-primary:hover {
    background-color: #006d82;
    border-color: #006d82;
}
</style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="login-card p-5">
                <h2 class="text-center mb-4" style="color: #004d5c;">
                    <i class="bi bi-soundwave"></i> DatosConsultora
                </h2>
                <h4 class="text-center mb-4">Crear Cuenta</h4>

                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                {% for category, message in messages %}
                <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} alert-dismissible fade show">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {% endfor %}
                {% endif %}
                {% endwith %}

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nombre completo</label>
                        <input type="text" name="nombre" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Teléfono</label>
                        <input type="tel" name="telefono" class="form-control" placeholder="54911XXXXXXXX" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" name="password" class="form-control" required minlength="6">
                        <small class="text-muted">Mínimo 6 caracteres</small>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Registrarme</button>
                </form>

                <div class="text-center mt-3">
                    <p class="text-muted">¿Ya tenés cuenta? <a href="{{ url_for('auth.login') }}" class="text-decoration-none">Ingresar</a></p>
                    <a href="/" class="text-muted text-decoration-none">← Volver al inicio</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
